<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Produtos</title>

  <!-- CSS -->
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/produtos.css">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>
  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>Horizon</h2>

      <button class="menu-btn" onclick="window.location.href='home.html'">
        Dashboard
      </button>

      <button class="menu-btn active">
        Produtos
      </button>

      <button class="menu-btn" onclick="window.location.href='estoque.html'">
        Estoque
      </button>
    </div>

    <!-- TOPBAR -->
    <div class="topbar">
      <h2>Produtos</h2>

      <div class="user-menu" onclick="toggleDropdown()">
        <div class="user-info">
          <!-- 🔴 ESSENCIAL -->
          <span id="userNome">...</span>
          <span id="seta">▼</span>
        </div>

        <!-- DROPDOWN -->
        <div class="dropdown" id="dropdown">
          <!-- 🔴 ESSENCIAL -->
          <p id="userNomeDrop"></p>
          <small id="userEmail"></small>

          <hr>

          <p class="logout" onclick="logout()">Sair</p>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">

    <div class="content-wrapper">


      <!-- FORM -->
      <div class="card form-card">
        <h3>Cadastrar / Editar Produto</h3>

        <div class="form-grid">
          <input type="text" id="nome" placeholder="Nome...">
          <input type="text" id="categoria" placeholder="Categoria...">
          <input type="text" id="marca" placeholder="Marca...">
          <input type="number" id="quantidade_minima" placeholder="Quantidade mínima...">
        </div>

        <button onclick="salvarProduto()">Salvar Produto</button>
      </div>

      <!-- TABELA -->
      <div class="card table-card">
        <div class="table-header">
          <h3>Lista de Produtos</h3>
          <input type="text" id="searchInput" placeholder="Buscar...">
        </div>

        <table>
          <thead>
            <tr>
              <th>Nome:</th>
              <th>Categoria:</th>
              <th>Marca:</th>
              <th>Mínimo:</th>
              <th>Ações:</th>
            </tr>
          </thead>

          <!-- 🔴 ESSENCIAL -->
          <tbody id="tabelaProdutos"></tbody>
        </table>
      </div>
    </div>
    </div>
  </div>

  <!-- JS (ORDEM IMPORTA) -->
  <script src="js/supabase.js"></script>
  <script src="js/produtos.js"></script>

</body>
</html>
